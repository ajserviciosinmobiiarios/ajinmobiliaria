<!-- @dsCard group="Type" viewport="700x150" name="Eyebrow & Labels" subtitle="Wide-tracked uppercase Montserrat for overlines, nav & CTAs." -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-canvas); color: var(--text-heading); padding: 28px 32px; display: flex; flex-direction: column; gap: 18px; }
  .eyebrow { font-size: 13px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--aj-gold); font-weight: 600; }
  .nav { font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-heading); font-weight: 500; display: flex; gap: 28px; }
  .cta { font-size: 13px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-heading); font-weight: 600; border-bottom: 1px solid var(--aj-gold); padding-bottom: 3px; width: fit-content; }
</style>
</head>
<body>
  <span class="eyebrow">Bidasoa · Donostialdea · Gipuzkoa</span>
  <div class="nav"><span>Servicios</span><span>Nosotros</span><span>Contacto</span></div>
  <span class="cta">Quiero que me llamen</span>
</body>
</html>

<!-- @dsCard group="Colors" viewport="700x150" name="Dark Neutrals" subtitle="Black for high-contrast surfaces; warm inks for text." -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-canvas); }
  .row { display: flex; gap: 0; padding: 20px; }
  .sw { flex: 1; height: 110px; display: flex; flex-direction: column; justify-content: flex-end; padding: 12px; box-sizing: border-box; }
  .sw span { font-size: 11px; letter-spacing: 0.04em; color: #fff; }
  .name { font-weight: 600; }
  .hex { opacity: 0.7; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:#000000"><span class="name">Black</span><span class="hex">#000000</span></div>
    <div class="sw" style="background:#15140F"><span class="name">Ink</span><span class="hex">#15140F</span></div>
    <div class="sw" style="background:#3A382F"><span class="name">Graphite</span><span class="hex">#3A382F</span></div>
    <div class="sw" style="background:#8C897E"><span class="name">Mist</span><span class="hex">#8C897E</span></div>
  </div>
</body>
</html>

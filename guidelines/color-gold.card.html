<!-- @dsCard group="Colors" viewport="700x150" name="Gold — Brand Accent" subtitle="The single accent. Wordmark, hairlines, emphasis." -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-canvas); }
  .row { display: flex; gap: 0; padding: 20px; }
  .sw { flex: 1; height: 110px; display: flex; flex-direction: column; justify-content: flex-end; padding: 12px; box-sizing: border-box; }
  .sw span { font-size: 11px; letter-spacing: 0.04em; }
  .name { font-weight: 600; }
  .hex { opacity: 0.75; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:#C6A75E"><span class="name" style="color:#15140F">Gold</span><span class="hex" style="color:#15140F">#C6A75E</span></div>
    <div class="sw" style="background:#A8884A"><span class="name" style="color:#fff">Gold Deep</span><span class="hex" style="color:#fff">#A8884A</span></div>
    <div class="sw" style="background:#D8C190"><span class="name" style="color:#15140F">Gold Soft</span><span class="hex" style="color:#15140F">#D8C190</span></div>
    <div class="sw" style="background:#F0E7D2"><span class="name" style="color:#15140F">Gold Tint</span><span class="hex" style="color:#15140F">#F0E7D2</span></div>
  </div>
</body>
</html>

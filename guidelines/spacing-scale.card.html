<!-- @dsCard group="Spacing" viewport="700x190" name="Spacing Scale" subtitle="8px base grid — editorial, generous." -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-canvas); color: var(--text-heading); padding: 24px 32px; }
  .row { display: flex; align-items: flex-end; gap: 18px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--aj-gold); width: 22px; }
  .lbl { font-size: 10px; color: var(--text-muted); letter-spacing: 0.03em; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:8px"></div><span class="lbl">8</span></div>
    <div class="item"><div class="bar" style="height:16px"></div><span class="lbl">16</span></div>
    <div class="item"><div class="bar" style="height:24px"></div><span class="lbl">24</span></div>
    <div class="item"><div class="bar" style="height:32px"></div><span class="lbl">32</span></div>
    <div class="item"><div class="bar" style="height:48px"></div><span class="lbl">48</span></div>
    <div class="item"><div class="bar" style="height:64px"></div><span class="lbl">64</span></div>
    <div class="item"><div class="bar" style="height:96px"></div><span class="lbl">96</span></div>
    <div class="item"><div class="bar" style="height:120px"></div><span class="lbl">128</span></div>
  </div>
</body>
</html>

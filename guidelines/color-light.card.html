<!-- @dsCard group="Colors" viewport="700x150" name="Light Neutrals" subtitle="Warm papers & champagne. Never pure white as a base." -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-canvas); }
  .row { display: flex; gap: 0; padding: 20px; }
  .sw { flex: 1; height: 110px; display: flex; flex-direction: column; justify-content: flex-end; padding: 12px; box-sizing: border-box; border: 1px solid rgba(0,0,0,0.06); }
  .sw span { font-size: 11px; letter-spacing: 0.04em; color: #15140F; }
  .name { font-weight: 600; }
  .hex { opacity: 0.65; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:#C8C3B6"><span class="name">Stone</span><span class="hex">#C8C3B6</span></div>
    <div class="sw" style="background:#E6DAC9"><span class="name">Cream</span><span class="hex">#E6DAC9</span></div>
    <div class="sw" style="background:#EFEAE0"><span class="name">Sand</span><span class="hex">#EFEAE0</span></div>
    <div class="sw" style="background:#F4F1EA"><span class="name">Paper</span><span class="hex">#F4F1EA</span></div>
    <div class="sw" style="background:#FFFFFF"><span class="name">White</span><span class="hex">#FFFFFF</span></div>
  </div>
</body>
</html>

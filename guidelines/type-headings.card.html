<!-- @dsCard group="Type" viewport="700x250" name="Heading Scale" subtitle="Serif display sizes, from hero to section." -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-serif); background: var(--surface-canvas); color: var(--text-heading); padding: 24px 32px; }
  .line { display: flex; align-items: baseline; gap: 16px; margin: 6px 0; }
  .line b { font-weight: 500; }
  .tag { font-family: var(--font-sans); font-size: 11px; color: var(--text-muted); letter-spacing: 0.05em; width: 90px; flex: none; }
  .h1 { font-size: 44px; line-height: 1.05; }
  .h2 { font-size: 32px; }
  .h3 { font-size: 24px; }
  .quote { font-size: 20px; font-style: italic; }
</style>
</head>
<body>
  <div class="line"><span class="tag">H1 · 64px</span><b class="h1">Donostialdea</b></div>
  <div class="line"><span class="tag">H2 · 48px</span><b class="h2">Estrategia a medida</b></div>
  <div class="line"><span class="tag">H3 · 32px</span><b class="h3">Comunicación constante</b></div>
  <div class="line"><span class="tag">Quote</span><b class="quote">“Trabajamos en exclusiva.”</b></div>
</body>
</html>

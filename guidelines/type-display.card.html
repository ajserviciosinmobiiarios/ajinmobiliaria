<!-- @dsCard group="Type" viewport="700x230" name="Display — Playfair Display" subtitle="Editorial serif. Key word often set in italic." -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-canvas); color: var(--text-heading); padding: 28px 32px; }
  .display { font-family: var(--font-serif); font-size: 56px; line-height: 1.05; font-weight: 500; letter-spacing: -0.01em; margin: 0; }
  .display em { font-style: italic; color: var(--aj-gold); }
  .meta { margin-top: 16px; font-size: 12px; letter-spacing: 0.04em; color: var(--text-muted); }
</style>
</head>
<body>
  <p class="display">Tu inmueble se merece algo <em>mejor</em>.</p>
  <p class="meta">Playfair Display · 400 / 500 / 700 · italic for emphasis</p>
</body>
</html>
